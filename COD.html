<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promosi Call of Duty Mobile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('https://cdn.callofduty.com/cdn/codm/home_bg.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
        }
        .header {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 20px;
            color: white;
            background: red;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
        }
        .btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>
    <div class="header">
        Call of Duty Mobile - Masuk ke Medan Perang!
    </div>
    <img src="CODMPDP_Hero.png" alt="Call of Duty Mobile Logo" class="full-width-image">
    <div class="container">
        <h2>Aksi Tanpa Batas di Ujung Jari Anda</h2>
        <p>Bergabunglah dengan jutaan pemain dan taklukkan medan perang dalam game FPS terbaik di dunia!</p>
        <a href="#" class="btn">Unduh Sekarang</a>
    </div>
    <style>
    .full-width-image {
        width: 100%;
        max-width: 800px;
        display: block;
        margin: 30px auto; /* Margin atas dan bawah sama */
        border-radius: 10px;
    }
</style>
</body>
</html>
